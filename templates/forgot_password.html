<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - RD PO Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'IBM Plex Sans Thai',sans-serif}</style>
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center p-4">
    <main class="w-full max-w-md rounded-2xl bg-white border border-slate-200 shadow-xl p-8">
        <a href="/login" class="text-xs font-semibold text-blue-700">กลับหน้า Login</a>
        <h1 class="mt-4 text-2xl font-bold text-slate-900">Forgot Password</h1>
        <p class="mt-1 text-sm text-slate-500">กรอก Email และตัวอักษรตามรูปเพื่อไปยังหน้า New Password</p>
        {% if error %}<div class="mt-5 rounded-lg border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-800">{{ error }}</div>{% endif %}
        {% if message %}<div class="mt-5 rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-800">{{ message }}</div>{% endif %}
        <form action="/forgot-password" method="POST" class="mt-6 space-y-4">
            <input type="hidden" name="captcha_token" value="{{ captcha_token }}">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Email</label>
                <input type="email" name="email" required class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">เขียนตัวอักษรที่เหมือนในรูป</label>
                <div class="flex items-center gap-3">
                    <img src="/captcha/forgot?token={{ captcha_token }}" alt="captcha" class="h-14 rounded-lg border border-slate-300 bg-slate-100">
                    <input type="text" name="captcha_answer" required maxlength="5" class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm uppercase tracking-widest focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            <button type="submit" class="w-full rounded-lg bg-blue-600 px-4 py-2.5 text-sm font-bold text-white hover:bg-blue-700">ไปหน้า New Password</button>
        </form>
    </main>
</body>
</html>
