<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Manage Materials — ทะเบียนพัสดุ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-6">
    <div class="max-w-4xl mx-auto">
        <div class="mb-4"><a href="/dashboard" class="text-xs text-blue-600 font-bold">⬅ กลับหน้าหลัก Dashboard</a></div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="bg-white p-4 rounded-xl border shadow-sm">
                <h2 class="text-xs font-bold text-slate-800 mb-2">📋 ก๊อปปี้วางทะเบียนวัตถุดิบ/พัสดุทีละหลายแถว</h2>
                <form action="/materials/bulk-paste" method="POST">
                    <textarea name="paste_data" rows="4" class="w-full border p-2 text-xs rounded-lg font-mono" placeholder="MAT001	Server 1U Rack&#10;MAT002	Router CISCO"></textarea>
                    <button type="submit" class="mt-2 bg-slate-800 text-white text-xs px-3 py-1.5 rounded-lg w-full">บันทึกแบบข้อมูลก๊อปปี้</button>
                </form>
            </div>
            
            <div class="bg-white p-4 rounded-xl border shadow-sm">
                <h2 class="text-xs font-bold text-slate-800 mb-2">✨ เพิ่มรายการเดียว</h2>
                <form action="/materials/add" method="POST" class="space-y-2">
                    <input type="text" name="material_code" placeholder="รหัสพัสดุ (Material Code)" required class="w-full border p-2 text-xs rounded-lg">
                    <input type="text" name="material_name" placeholder="ชื่อรายการสิ่งของ" required class="w-full border p-2 text-xs rounded-lg">
                    <button type="submit" class="bg-blue-600 text-white text-xs px-3 py-1.5 rounded-lg w-full">เพิ่มรายการ</button>
                </form>
            </div>
        </div>

        <div class="bg-white rounded-xl border overflow-hidden text-xs">
            <table class="w-full text-left">
                <thead class="bg-slate-800 text-white">
                    <tr>
                        <th class="p-3">Material Code</th>
                        <th class="p-3">Material Name</th>
                        <th class="p-3 text-center">Action</th>
                    </tr>
                </thead>
                <tbody class="divide-y">
                    {% for m in materials %}
                    <tr>
                        <td class="p-3 font-mono">{{ m.material_code }}</td>
                        <td class="p-3 font-medium">{{ m.material_name }}</td>
                        <td class="p-3 text-center"><a href="/materials/delete/{{ m.material_code }}" onclick="return confirm('ลบพัสดุรายการนี้?')" class="text-rose-600">ลบ</a></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
